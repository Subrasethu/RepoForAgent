# ── Project paths ──────────────────────────────────
paths:
  input_folder: "data/input"
  output_folder: "data/output"
  master_repo: "data/output/master_repo.xlsx"
  embeddings_index: "data/output/embeddings.index"

# ── CSV settings ───────────────────────────────────
csv:
  ticket_id_column: "ticket_id"
  description_column: "description"
  resolution_column: "resolution"
  status_column: "status"
  validity__column: "validity"
  resolved_value: "Resolved"
  # ── Similarity settings ─────────────────────────────
similarity:
  threshold: 0.88
  top_matches: 3
# ── Embedding model ─────────────────────────────────
embedding:
  model_name: "nomic-embed-text"
  ollama_url: "http://localhost:11434"
  dimensions: 768
# ── Approval settings ───────────────────────────────
# ── Approval & Validation settings ─────────────────
approval:
  reviewer_name: "AMS Reviewer"
  default_validity: "Active"
  validity_options:
    - "Active"
    - "Obsolete"
    - "Under Review"
# ── Master repo columns ─────────────────────────────
master_repo:
  source_default: "CSV"
  sop_prefix: "SOP-AMS-"